spring.application.name=ostrackerservice
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ostracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ostracker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ostracker}
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

app.sms.mock-enabled=${APP_SMS_MOCK_ENABLED:true}
app.debug.endpoints-enabled=${APP_DEBUG_ENDPOINTS_ENABLED:false}
twilio.account-sid=${TWILIO_ACCOUNT_SID:ACmock}
twilio.auth-token=${TWILIO_AUTH_TOKEN:tokenmock}
twilio.from-number=${TWILIO_FROM_NUMBER:+1234567890}
twilio.client-portal-url=${TWILIO_CLIENT_PORTAL_URL:http://localhost:3000}

jobs.reminder-retry.enabled=true
jobs.reminder-retry.cron=0 0 9 * * *
jobs.reminder-retry.batch-size=200
