spring.application.name=ostrackerservice
server.port=${PORT:8080}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.probes.enabled=true

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

app.sms.mock-enabled=${APP_SMS_MOCK_ENABLED:true}
app.debug.endpoints-enabled=${APP_DEBUG_ENDPOINTS_ENABLED:false}
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.from-number=${TWILIO_FROM_NUMBER}
twilio.client-portal-url=${TWILIO_CLIENT_PORTAL_URL:http://localhost:3000}

jobs.reminder-retry.enabled=true
jobs.reminder-retry.cron=0 0 9 * * *
jobs.reminder-retry.batch-size=200

# Security
app.security.jwt-secret=${APP_SECURITY_JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
app.security.jwt-expiration=${APP_SECURITY_JWT_EXPIRATION:86400000}
app.security.client-secret=${APP_SECURITY_CLIENT_SECRET:dev-secret-change-in-production}
app.security.superuser.bootstrap-enabled=${APP_SECURITY_SUPERUSER_BOOTSTRAP_ENABLED:true}
app.security.superuser.email=${APP_SECURITY_SUPERUSER_EMAIL:superuser@localhost}
app.security.superuser.display-name=${APP_SECURITY_SUPERUSER_DISPLAY_NAME:Superusuario Primario}

# Google OAuth
app.security.google.client-id=${APP_SECURITY_GOOGLE_CLIENT_ID:}
app.security.google.jwks-uri=${APP_SECURITY_GOOGLE_JWKS_URI:https://www.googleapis.com/oauth2/v3/certs}
app.security.google.allowed-domain=${APP_SECURITY_GOOGLE_ALLOWED_DOMAIN:}
app.security.google.clock-skew-seconds=${APP_SECURITY_GOOGLE_CLOCK_SKEW_SECONDS:0}
app.security.google.http-timeout-ms=${APP_SECURITY_GOOGLE_HTTP_TIMEOUT_MS:5000}
app.security.cors.allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://127.0.0.1:8081,http://localhost:19006,http://127.0.0.1:19006}
