spring.application.name=ostrackerservice
server.port=${PORT:8080}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.probes.enabled=true

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

app.sms.mock-enabled=${APP_SMS_MOCK_ENABLED:true}
app.debug.endpoints-enabled=${APP_DEBUG_ENDPOINTS_ENABLED:false}
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.from-number=${TWILIO_FROM_NUMBER}
twilio.client-portal-url=${TWILIO_CLIENT_PORTAL_URL:http://localhost:3000}

jobs.reminder-retry.enabled=true
jobs.reminder-retry.cron=0 0 9 * * *
jobs.reminder-retry.batch-size=200
