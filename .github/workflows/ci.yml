name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      # Embora o Testcontainers suba o banco para os testes de integração,
      # ter o Docker disponível é essencial (já incluso no ubuntu-latest).
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ostracker_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Lint (Ktlint)
      run: ./gradlew ktlintCheck

    - name: Build and Run Tests
      run: ./gradlew build
      env:
        # Variáveis necessárias para o build/testes passarem sem erros de contexto
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ostracker_test
        SPRING_DATASOURCE_USERNAME: test
        SPRING_DATASOURCE_PASSWORD: test
        TWILIO_ACCOUNT_SID: ACmock
        TWILIO_AUTH_TOKEN: tokenmock
        TWILIO_FROM_NUMBER: +1234567890

    - name: Upload Build Reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: build/reports/
